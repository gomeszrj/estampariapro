
<!DOCTYPE html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data: https:;" />
    <title>ERP Estamparia AI-First</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0b1221;
        -webkit-tap-highlight-color: transparent;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0b1221;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 9px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6366f1;
      }
      
      @media print {
        body { background-color: white !important; color: black !important; }
        * { color: black !important; border-color: #ddd !important; }
        .print\:hidden { display: none !important; }
        .print\:block { display: block !important; }
        .bg-\[\#151B2B\] { background-color: white !important; border: 1px solid #ddd !important; box-shadow: none !important; }
        /* Keep positive/negative colors in print if possible, but fallback to black is safer. Let's force specific text colors back */
        .text-emerald-400 { color: #059669 !important; }
        .text-rose-400 { color: #e11d48 !important; }
        .text-rose-500 { color: #e11d48 !important; }
        .text-\[\#818cf8\] { color: #4f46e5 !important; }
        .text-orange-400 { color: #ea580c !important; }
      }
  </style>
</head>
  <body class="bg-[#0b1221] text-slate-200">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
